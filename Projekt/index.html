<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Interaktiivne mäng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tere tulemast!</h1>

<!-- 🔹 NAV -->
<div class="tabs">
    <button onclick="showTab('home')">Avaleht</button>
    <button onclick="showTab('quiz')">Viktoriin</button>
    <button onclick="showTab('guess')">Arva number</button>
</div>

<!--HOME -->
<section id="home" class="tab active">
    <h2>Tere!</h2>
    <p>Vali mäng ja alusta</p>
</section>

<!--QUIZ -->
<section id="quiz" class="tab">

    <h2>Viktoriin</h2>

    <input type="text" id="playerName" placeholder="Sisesta nimi" oninput="handleInput()">
    <br>
    <button onclick="startQuiz()">▶ Alusta</button>

    <p id="progress"></p>
    <p id="question"></p>

    <button id="ans0" onclick="checkAnswer(0)"></button>
    <button id="ans1" onclick="checkAnswer(1)"></button>
    <button id="ans2" onclick="checkAnswer(2)"></button>

    <p id="quizResult"></p>

    <div class="actions">
        <button class="new" onclick="startQuiz()">Uus mäng</button>
        <button onclick="clearQuizScores()">🗑 Tühjenda tulemused</button>
    </div>

    <h3>Parimad mängijad</h3>
    <ul id="quizScores"></ul>
</section>

<!--GUESS -->
<section id="guess" class="tab">

    <h2>Arva number</h2>

    <input type="text" id="playerGuessName" placeholder="Sisesta nimi">
    <br>
    <button onclick="startGuess()">▶ Alusta</button>

    <p id="guessProgress"></p>

    <input type="number" id="guessInput" placeholder="1–5">
    <br>
    <button onclick="checkGuess()">Kontrolli</button>

    <p id="guessResult"></p>

    <div class="actions">
        <button class="new" onclick="startGuess()">Uus mäng</button>
        <button onclick="clearGuessScores()">🗑 Tühjenda tulemused</button>
    </div>

    <h3>Parimad mängijad</h3>
    <ul id="guessScores"></ul>
</section>

<script src="script.js"></script>
</body>
</html>
