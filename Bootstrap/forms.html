<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="text-center">
            <h2>Get in touch</h2>
            <p class="lead">Kui on küsimusi, siis ära küsi.</p>
        </div>

        <div class="row justify-content-center my-5">
            <div class="col-lg-6">
                <form action="">
                    <label for="form-label" for="email">Email:</label>
                    <input 
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="my@email.com"
                    />
                    <div class="form-floating my-5">
                        <input 
                            type="text"
                            id="name"
                            placeholder="e.g. Jim"
                            class="form-control"
                        />
                        <label class="form-label" for="name">Name:</label>
                    </div>
                    <label class="form-label" for="subject">Subject</label>
                    <select class="form-select" id="subject">
                        <option value="">Pricing</option>
                        <option value="1">Technical question</option>
                        <option value="2">Support request</option>
                        <option value="3">Other</option>
                    </select>

                    <div class="form-floating my-5">
                        <textarea
                            name="query"
                            class="form-control"
                            id="query"
                            placeholder="Leave a message here"
                            style="height: 150px"></textarea>
                        <label for="query">Write a message</label>
                    </div>
                    
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">Send</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
